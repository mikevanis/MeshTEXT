<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>MeshText</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Courier New',Courier,monospace;background:#000;color:#ccc;
  max-width:480px;margin:0 auto;padding:0;-webkit-user-select:none;user-select:none;
  min-height:100vh}

/* Teletext header */
.header{background:#000;padding:10px 12px 6px;border-bottom:2px solid #0ff;display:flex;
  align-items:center;justify-content:space-between}
.header h1{color:#0ff;font-size:20px;font-weight:bold;letter-spacing:2px}
.header .node-id{color:#666;font-size:11px}

/* Buttons */
button{font-family:'Courier New',Courier,monospace;border:1px solid #444;background:#111;
  color:#ccc;padding:8px 12px;cursor:pointer;font-size:13px}
button:active{opacity:0.7}
button.primary{border-color:#0a0;color:#0f0}
button.danger{border-color:#a00;color:#f44}
button.nav{border-color:#0aa;color:#0ff}

/* ===== SCREEN 1: PAGE LIST ===== */
#screen-list{padding:8px 12px}

/* Node settings bar */
.node-bar{display:flex;gap:6px;align-items:center;margin:8px 0 12px;flex-wrap:wrap}
.node-bar input,.node-bar select,.node-bar button{font-family:'Courier New',Courier,monospace;
  background:#111;border:1px solid #444;color:#fff;padding:0 8px;font-size:13px;height:36px}
.node-bar input{flex:1;min-width:100px}
.node-bar select{min-width:90px}
.node-bar button{background:#111;height:36px}

/* Page list */
.page-list-header{color:#0ff;font-size:14px;margin:8px 0 4px;padding:4px 0;
  border-bottom:1px solid #333}
.page-entry{display:flex;align-items:center;padding:8px 6px;margin:2px 0;
  border-left:3px solid #666;background:#0a0a0a}
.page-entry:nth-child(6n+1){border-left-color:#f00}
.page-entry:nth-child(6n+2){border-left-color:#0f0}
.page-entry:nth-child(6n+3){border-left-color:#ff0}
.page-entry:nth-child(6n+4){border-left-color:#00f}
.page-entry:nth-child(6n+5){border-left-color:#f0f}
.page-entry:nth-child(6n+6){border-left-color:#0ff}
.page-entry .pnum{color:#ff0;font-size:14px;margin-right:8px;min-width:36px}
.page-entry .ptitle{flex:1;color:#fff;font-size:13px;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap}
.page-entry .pactions{display:flex;gap:4px}
.page-entry .pactions button{padding:5px 10px;font-size:12px}

.add-bar{margin:10px 0;display:flex;gap:6px}

/* ===== SCREEN 2: EDITOR ===== */
#screen-editor{display:none;padding:0}

/* Top bar */
.top-bar{display:flex;gap:4px;align-items:stretch;padding:4px;
  background:#0a0a0a;border-bottom:1px solid #333}
.top-bar input,.top-bar button{font-family:'Courier New',Courier,monospace;background:#111;
  border:1px solid #444;color:#fff;padding:0 8px;font-size:13px;height:38px}
.top-bar .pg-num-in{width:64px;text-align:center}
.top-bar .pg-title-in{flex:1;min-width:80px}

/* Grid */
#grid-wrap{background:#000;padding:4px;margin:0;overflow-x:auto;-webkit-overflow-scrolling:touch}
#grid{display:grid;grid-template-columns:repeat(20,minmax(18px,1fr));gap:0;
  width:100%;aspect-ratio:20/8}
.cell{aspect-ratio:6/8;border:1px solid #1a1a1a;display:flex;align-items:center;
  justify-content:center;font-family:'Courier New',Courier,monospace;
  font-size:min(3.5vw,14px);color:#fff;cursor:pointer;position:relative;background:#000}
.cell.sel{border-color:#0ff;box-shadow:inset 0 0 0 1px #0ff}
.cell canvas{position:absolute;inset:0;width:100%;height:100%}

/* Mode tabs */
.mode-tabs{display:flex;border-bottom:2px solid #333;margin:0 4px}
.mode-tab{flex:1;padding:10px 0;text-align:center;color:#888;font-size:13px;
  cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;background:#000}
.mode-tab.active{color:#0ff;border-bottom-color:#0ff}

/* Tool area */
#tool-area{padding:4px;min-height:60px}

/* Block editor grid */
#block-grid{display:inline-grid;grid-template-columns:1fr 1fr;gap:4px;margin:6px 0}
#block-grid .blk{width:40px;height:28px;border:2px solid #444;cursor:pointer;background:#000}
#block-grid .blk.on{background:#fff}

/* Graphic sub-mode toggle */
.sub-mode-bar{display:flex;gap:4px;margin-bottom:8px}
.sub-mode-bar button{flex:1}
.sub-mode-bar button.active{border-color:#0ff;color:#0ff}

/* Interactive tools */
.interact-tools .bar{display:flex;gap:4px;margin:4px 0;flex-wrap:wrap}
.interact-tools .bar button{flex:1;min-width:60px;padding:8px 4px;font-size:12px}

/* Floating link input near selected cell */
#link-popup{display:none;position:absolute;z-index:50;background:#111;border:2px solid #f80;
  padding:8px;min-width:180px}
#link-popup .link-row{display:flex;gap:4px;align-items:center;margin-top:4px}
#link-popup input{font-family:'Courier New',Courier,monospace;background:#000;
  border:1px solid #444;color:#fff;padding:6px 8px;font-size:14px;width:70px}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);
  z-index:100;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#111;border:2px solid #0ff;padding:20px;max-width:300px;width:90%;
  text-align:center}
.modal p{margin-bottom:16px;font-size:14px;color:#fff}
.modal .bar{display:flex;gap:8px;justify-content:center}

/* Hidden input for text typing */
#hidden-input{position:absolute;left:-9999px;top:-9999px;opacity:0;width:1px;height:1px}

/* Save flash */
button.saved{background:#0a0 !important;color:#fff !important;border-color:#0f0 !important}

/* Status */
#status{text-align:center;padding:6px 12px;font-size:12px;min-height:22px;color:#0f0;
  position:fixed;bottom:0;left:0;right:0;background:#000;border-top:1px solid #222}
#status.err{color:#f44}
</style>
</head>
<body>

<!-- ===== SCREEN 1: PAGE LIST ===== -->
<div id="screen-list">
  <div class="header">
    <h1>░ MESH░TEXT ░</h1>
    <span class="node-id" id="nd-id"></span>
  </div>

  <div class="node-bar">
    <input type="text" id="nd-name" maxlength="15" placeholder="Node name">
    <select id="nd-cat">
      <option value="0">General</option>
      <option value="1">Weather</option>
      <option value="2">Community</option>
      <option value="3">Personal</option>
      <option value="4">Info</option>
      <option value="5">Fun</option>
      <option value="6">Sensor</option>
    </select>
    <button class="primary" onclick="saveNode()">Save</button>
  </div>

  <div class="page-list-header">PAGES</div>
  <div id="page-list"></div>

  <div class="add-bar">
    <button class="nav" style="flex:1" onclick="addPage()">+ New Page</button>
  </div>
</div>

<!-- ===== SCREEN 2: EDITOR ===== -->
<div id="screen-editor">
  <div class="top-bar">
    <button class="nav" onclick="goBack()">&lt; Back</button>
    <input type="number" class="pg-num-in" id="pg-num" min="1" max="255" title="Page number">
    <input type="text" class="pg-title-in" id="pg-title" maxlength="15" placeholder="Title">
    <button class="primary" onclick="savePage()">Save</button>
  </div>

  <div id="grid-wrap"><div id="grid"></div></div>

  <div class="mode-tabs">
    <div class="mode-tab active" data-mode="text" onclick="setMode('text')">Text</div>
    <div class="mode-tab" data-mode="graphic" onclick="setMode('graphic')">Graphic</div>
    <div class="mode-tab" data-mode="interact" onclick="setMode('interact')">Interactive</div>
  </div>

  <div id="tool-area">
    <!-- Text tools -->
    <div id="tools-text">
      <div style="color:#888;font-size:12px;margin:4px 0">Tap a cell and type. Arrow keys to move.</div>
      <button onclick="clearCell()">Clear Cell</button>
    </div>

    <!-- Graphic tools -->
    <div id="tools-graphic" style="display:none">
      <div class="sub-mode-bar">
        <button class="active" id="btn-paint" onclick="setGraphicSub('paint')">Paint</button>
        <button id="btn-detail" onclick="setGraphicSub('detail')">Detail</button>
        <button onclick="clearCell()">Clear Cell</button>
      </div>
      <div id="paint-hint" style="color:#888;font-size:12px">Tap or drag to paint blocks.</div>
      <div id="detail-panel" style="display:none">
        <div id="block-grid"></div>
      </div>
    </div>

    <!-- Interactive tools -->
    <div id="tools-interact" style="display:none">
      <div class="interact-tools">
        <div class="bar">
          <button onclick="placeInteractive(0xF1)">Vote A Btn</button>
          <button onclick="placeInteractive(0xF2)">Vote B Btn</button>
        </div>
        <div class="bar">
          <button onclick="placeInteractive(0xF3)">A Count</button>
          <button onclick="placeInteractive(0xF4)">B Count</button>
          <button onclick="placeInteractive(0xF0)">Visitors</button>
        </div>
        <div class="bar">
          <button onclick="showLinkInput()">Link &rarr;</button>
          <button onclick="clearCell()">Clear Cell</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Floating link popup -->
<div id="link-popup">
  <div style="font-size:12px;color:#f80">Link to page:</div>
  <div class="link-row">
    <input type="number" id="link-target" min="1" max="255" placeholder="1-255">
    <button onclick="placeLink()">OK</button>
    <button onclick="hideLinkInput()">X</button>
  </div>
</div>

<!-- Unsaved changes modal -->
<div class="modal-overlay" id="modal-unsaved">
  <div class="modal">
    <p>You have unsaved changes.</p>
    <div class="bar">
      <button class="primary" onclick="saveAndExit()">Save &amp; Exit</button>
      <button class="danger" onclick="discardAndExit()">Discard</button>
    </div>
  </div>
</div>

<input id="hidden-input" type="text" autocomplete="off" autocorrect="off" autocapitalize="off">

<div id="status"></div>

<script>
// ===== STATE =====
let cells = new Uint8Array(160);
let selIdx = 0;
let mode = 'text';
let graphicSub = 'paint';
let pageNum = 100;
let pageFlags = 0;
let pageTitle = 'Untitled';
let pages = [];
let dirty = false;
let painting = false;

const COLS = 20, ROWS = 8;
const CELL_LINK = 0xF5;
const INTERACT_LABELS = {0xF0:'VIS',0xF1:'[A]',0xF2:'[B]',0xF3:'#A',0xF4:'#B'};
const INTERACT_COLORS = {0xF0:'#0f0',0xF1:'#ff0',0xF2:'#ff0',0xF3:'#0ff',0xF4:'#0ff'};

// ===== GRID INIT =====
const grid = document.getElementById('grid');
for (let i = 0; i < 160; i++) {
  const d = document.createElement('div');
  d.className = 'cell';
  d.dataset.i = i;
  d.addEventListener('pointerdown', (e) => { onCellDown(i, e); });
  d.addEventListener('pointerenter', (e) => { onCellEnter(i, e); });
  grid.appendChild(d);
}
grid.addEventListener('pointerup', () => { painting = false; });
grid.addEventListener('pointerleave', () => { painting = false; });
// Prevent default touch scrolling on grid for paint drag
grid.addEventListener('touchmove', (e) => {
  if (mode === 'graphic' && graphicSub === 'paint') e.preventDefault();
}, { passive: false });

// Block editor sub-rectangles
const bgrid = document.getElementById('block-grid');
for (let b = 0; b < 6; b++) {
  const d = document.createElement('div');
  d.className = 'blk';
  d.dataset.b = b;
  d.addEventListener('click', () => toggleBlock(b));
  bgrid.appendChild(d);
}

// Hidden input for text mode
const hiddenInput = document.getElementById('hidden-input');
hiddenInput.addEventListener('input', function() {
  if (mode !== 'text') return;
  if (this.value.length > 0) {
    let ch = this.value.charCodeAt(this.value.length - 1);
    if (ch >= 0x20 && ch <= 0x7E) {
      clearLinkAt(selIdx);
      cells[selIdx] = ch;
      dirty = true;
      if (selIdx < 159) selectCell(selIdx + 1);
      renderGrid();
    }
    this.value = '';
  }
});
hiddenInput.addEventListener('keydown', function(e) {
  if (mode !== 'text') return;
  if (e.key === 'Backspace') {
    e.preventDefault();
    cells[selIdx] = 0;
    dirty = true;
    if (selIdx > 0) selectCell(selIdx - 1);
    renderGrid();
  } else if (e.key === 'ArrowLeft' && selIdx > 0) {
    e.preventDefault(); selectCell(selIdx - 1);
  } else if (e.key === 'ArrowRight' && selIdx < 159) {
    e.preventDefault(); selectCell(selIdx + 1);
  } else if (e.key === 'ArrowUp' && selIdx >= COLS) {
    e.preventDefault(); selectCell(selIdx - COLS);
  } else if (e.key === 'ArrowDown' && selIdx + COLS < 160) {
    e.preventDefault(); selectCell(selIdx + COLS);
  }
});

// Clear any link block overlapping cell i (without clearing cell i itself)
function clearLinkAt(i) {
  let origin = -1;
  for (let k = 0; k < 4; k++) {
    if (i - k >= 0 && cells[i - k] === CELL_LINK) { origin = i - k; break; }
  }
  if (origin >= 0) {
    for (let k = 0; k < 4 && origin + k < 160; k++) {
      if (origin + k !== i) cells[origin + k] = 0;
    }
  }
}

// ===== CELL INTERACTIONS =====
function onCellDown(i, e) {
  e.preventDefault();
  if (mode === 'graphic' && graphicSub === 'paint') {
    painting = true;
    paintCell(i);
    selectCell(i);
  } else {
    selectCell(i);
    if (mode === 'text') {
      hiddenInput.focus();
    } else if (mode === 'graphic' && graphicSub === 'detail') {
      updateBlockEditor();
    }
  }
}

function onCellEnter(i, e) {
  if (painting && mode === 'graphic' && graphicSub === 'paint') {
    paintCell(i);
  }
}

function paintCell(i) {
  clearLinkAt(i);
  // Toggle: if already a full block, clear it; otherwise set full block
  if (cells[i] === 0xBF) {
    cells[i] = 0x00;
  } else {
    cells[i] = 0xBF;
  }
  dirty = true;
  renderGrid();
}

function selectCell(i) {
  selIdx = i;
  const children = grid.children;
  for (let j = 0; j < 160; j++) {
    children[j].classList.toggle('sel', j === i);
  }
  if (mode === 'graphic' && graphicSub === 'detail') updateBlockEditor();
}

// ===== MODES =====
function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.mode === m);
  });
  document.getElementById('tools-text').style.display = (m === 'text') ? '' : 'none';
  document.getElementById('tools-graphic').style.display = (m === 'graphic') ? '' : 'none';
  document.getElementById('tools-interact').style.display = (m === 'interact') ? '' : 'none';
  if (m === 'text') hiddenInput.focus();
  if (m === 'graphic' && graphicSub === 'detail') updateBlockEditor();
}

function setGraphicSub(sub) {
  graphicSub = sub;
  document.getElementById('btn-paint').classList.toggle('active', sub === 'paint');
  document.getElementById('btn-detail').classList.toggle('active', sub === 'detail');
  document.getElementById('paint-hint').style.display = (sub === 'paint') ? '' : 'none';
  document.getElementById('detail-panel').style.display = (sub === 'detail') ? '' : 'none';
  if (sub === 'detail') updateBlockEditor();
}

// ===== BLOCK EDITING =====
function updateBlockEditor() {
  const v = cells[selIdx];
  const isBlock = (v & 0x80) !== 0;
  const bits = isBlock ? (v & 0x3F) : 0;
  document.querySelectorAll('#block-grid .blk').forEach(el => {
    const b = parseInt(el.dataset.b);
    el.classList.toggle('on', (bits & (1 << b)) !== 0);
  });
}

function toggleBlock(b) {
  let v = cells[selIdx];
  let bits = (v & 0x80) ? (v & 0x3F) : 0;
  bits ^= (1 << b);
  cells[selIdx] = 0x80 | bits;
  dirty = true;
  updateBlockEditor();
  renderGrid();
}

function clearCell() {
  // If this cell is part of a link, clear all 4 cells
  let linkOrigin = -1;
  for (let k = 0; k < 4; k++) {
    if (selIdx - k >= 0 && cells[selIdx - k] === CELL_LINK) { linkOrigin = selIdx - k; break; }
  }
  if (linkOrigin >= 0) {
    for (let k = 0; k < 4 && linkOrigin + k < 160; k++) cells[linkOrigin + k] = 0;
    selectCell(linkOrigin);
  } else {
    cells[selIdx] = 0;
  }
  dirty = true;
  renderGrid();
  if (mode === 'graphic' && graphicSub === 'detail') updateBlockEditor();
}

// ===== INTERACTIVE =====
function placeInteractive(code) {
  clearLinkAt(selIdx);
  cells[selIdx] = code;
  dirty = true;
  renderGrid();
  if (selIdx < 159) selectCell(selIdx + 1);
}

function showLinkInput() {
  const popup = document.getElementById('link-popup');
  // Position near selected cell
  const cellEl = grid.children[selIdx];
  const cellRect = cellEl.getBoundingClientRect();
  popup.style.display = 'block';
  popup.style.left = Math.max(4, Math.min(cellRect.left, window.innerWidth - 200)) + 'px';
  popup.style.top = (cellRect.bottom + 4) + 'px';
  document.getElementById('link-target').value = '';
  document.getElementById('link-target').focus();
}
function hideLinkInput() {
  document.getElementById('link-popup').style.display = 'none';
}
function placeLink() {
  const n = parseInt(document.getElementById('link-target').value);
  if (isNaN(n) || n < 1 || n > 255) { status('Invalid page number', true); return; }
  if (selIdx + 3 >= 160) { status('Need 4 cells for link', true); return; }
  cells[selIdx] = CELL_LINK;
  cells[selIdx + 1] = n;
  cells[selIdx + 2] = 0;
  cells[selIdx + 3] = 0;
  dirty = true;
  hideLinkInput();
  renderGrid();
  if (selIdx + 4 < 160) selectCell(selIdx + 4);
  else selectCell(159);
}

// ===== RENDER GRID =====
function renderGrid() {
  const divs = grid.children;
  for (let i = 0; i < 160; i++) {
    const d = divs[i];
    const v = cells[i];
    d.textContent = '';
    const oldC = d.querySelector('canvas');
    if (oldC) oldC.remove();

    // Find if this cell is part of a 4-cell link block
    let linkOrigin = -1;
    for (let k = 0; k < 4; k++) {
      if (i - k >= 0 && cells[i - k] === CELL_LINK) { linkOrigin = i - k; break; }
    }

    if (linkOrigin >= 0 && linkOrigin + 1 < 160) {
      const target = cells[linkOrigin + 1];
      const label = '\u2192' + String(target).padStart(3, ' ');
      const offset = i - linkOrigin;
      d.textContent = label[offset] || '';
      d.style.color = '#f80';
      d.style.fontSize = '';
    } else if (v >= 0xF0 && v <= 0xF5) {
      {
        d.textContent = INTERACT_LABELS[v] || '?';
        d.style.color = INTERACT_COLORS[v] || '#fff';
        d.style.fontSize = 'min(2.5vw,10px)';
      }
    } else if (v === 0) {
      d.style.color = '#fff';
      d.style.fontSize = '';
    } else if ((v & 0x80) === 0) {
      d.textContent = String.fromCharCode(v);
      d.style.color = '#fff';
      d.style.fontSize = '';
    } else {
      d.style.color = '#fff';
      d.style.fontSize = '';
      const c = document.createElement('canvas');
      c.width = 6; c.height = 8;
      const ctx = c.getContext('2d');
      const bits = v & 0x3F;
      ctx.fillStyle = '#fff';
      for (let b = 0; b < 6; b++) {
        if (bits & (1 << b)) {
          const col = b & 1, row = b >> 1;
          ctx.fillRect(col * 3, row * 2, 3, 2);
        }
      }
      d.appendChild(c);
    }
  }
}

// ===== SCREEN NAVIGATION =====
function showPageList() {
  document.getElementById('screen-list').style.display = 'block';
  document.getElementById('screen-editor').style.display = 'none';
  loadPageList();
}

function showEditor(num) {
  document.getElementById('screen-list').style.display = 'none';
  document.getElementById('screen-editor').style.display = 'block';
  loadPageData(num);
}

function goBack() {
  if (dirty) {
    document.getElementById('modal-unsaved').classList.add('show');
  } else {
    showPageList();
  }
}

async function saveAndExit() {
  document.getElementById('modal-unsaved').classList.remove('show');
  await savePage();
  showPageList();
}

function discardAndExit() {
  document.getElementById('modal-unsaved').classList.remove('show');
  dirty = false;
  showPageList();
}

// ===== API =====
async function api(method, path, body) {
  const opts = { method, headers: {} };
  if (body !== undefined) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  const r = await fetch(path, opts);
  if (!r.ok) throw new Error(r.statusText);
  return r.json();
}

function status(msg, err) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = err ? 'err' : '';
  if (!err) setTimeout(() => { if (el.textContent === msg) el.textContent = ''; }, 2000);
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ===== PAGE LIST =====
async function loadPageList() {
  try {
    pages = await api('GET', '/api/pages');
    renderPageList();
  } catch(e) {
    status('Failed to load pages: ' + e.message, true);
  }
}

function renderPageList() {
  const el = document.getElementById('page-list');
  el.innerHTML = '';
  pages.forEach(p => {
    const d = document.createElement('div');
    d.className = 'page-entry';
    d.innerHTML = `<span class="pnum">${p.page_num}</span>`
      + `<span class="ptitle">${esc(p.title || 'Untitled')}</span>`
      + `<span class="pactions">`
      + `<button class="nav" onclick="event.stopPropagation();showEditor(${p.page_num})">Edit</button>`
      + `<button class="danger" onclick="event.stopPropagation();deletePage(${p.page_num})">&times;</button>`
      + `</span>`;
    el.appendChild(d);
  });
}

// ===== PAGE DATA =====
async function loadPageData(num) {
  try {
    const d = await api('GET', `/api/page/${num}`);
    pageNum = d.page_num;
    pageFlags = d.flags;
    pageTitle = d.title;
    for (let i = 0; i < 160; i++) cells[i] = d.cells[i] || 0;
    dirty = false;
    document.getElementById('pg-num').value = pageNum;
    document.getElementById('pg-title').value = pageTitle;
    selIdx = 0;
    selectCell(0);
    renderGrid();
    status(`Loaded page ${num}`);
  } catch(e) {
    status('Load failed: ' + e.message, true);
  }
}

async function savePage() {
  pageNum = parseInt(document.getElementById('pg-num').value) || pageNum;
  pageTitle = document.getElementById('pg-title').value || pageTitle;

  // Auto-compute flags from cell contents
  pageFlags = 0;
  for (let i = 0; i < 160; i++) {
    if (cells[i] === 0xF1 || cells[i] === 0xF2) pageFlags |= 2; // poll
    if (cells[i] === 0xF0) pageFlags |= 4; // visitor
  }

  try {
    await api('PUT', `/api/page/${pageNum}`, {
      page_num: pageNum,
      flags: pageFlags,
      title: pageTitle,
      cells: Array.from(cells)
    });
    dirty = false;
    // Flash save button green
    const saveBtn = document.querySelector('.top-bar .primary');
    saveBtn.classList.add('saved');
    saveBtn.textContent = 'Saved!';
    setTimeout(() => { saveBtn.classList.remove('saved'); saveBtn.textContent = 'Save'; }, 2500);
  } catch(e) {
    status('Save failed: ' + e.message, true);
  }
}

async function addPage() {
  const used = new Set(pages.map(p => p.page_num));
  let num = 100;
  while (used.has(num) && num < 256) num++;
  if (num > 255) { status('No free page numbers', true); return; }

  // Create a blank page via API, then open editor
  try {
    await api('PUT', `/api/page/${num}`, {
      page_num: num,
      flags: 0,
      title: 'New Page',
      cells: new Array(160).fill(0x20)
    });
    showEditor(num);
  } catch(e) {
    status('Failed to create page: ' + e.message, true);
  }
}

let delPending = 0;
let delTimer = null;
async function deletePage(num) {
  if (delPending !== num) {
    delPending = num;
    status(`Tap X again to delete page ${num}`);
    clearTimeout(delTimer);
    delTimer = setTimeout(() => { delPending = 0; }, 3000);
    return;
  }
  clearTimeout(delTimer);
  delPending = 0;
  try {
    await api('DELETE', `/api/page/${num}`);
    status(`Deleted page ${num}`);
    await loadPageList();
  } catch(e) {
    status('Delete failed: ' + e.message, true);
  }
}

// ===== NODE SETTINGS =====
async function loadNode() {
  try {
    const d = await api('GET', '/api/config');
    document.getElementById('nd-name').value = d.name;
    document.getElementById('nd-cat').value = d.category;
    document.getElementById('nd-id').textContent = (d.node_id || '').toUpperCase();
  } catch(e) {}
}

async function saveNode() {
  try {
    await api('PUT', '/api/config', {
      name: document.getElementById('nd-name').value,
      category: parseInt(document.getElementById('nd-cat').value)
    });
    status('Node saved!');
  } catch(e) {
    status('Save failed: ' + e.message, true);
  }
}

// ===== INIT =====
renderGrid();
loadPageList();
loadNode();
</script>
